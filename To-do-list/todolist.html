<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To_Do_List Project</title>
    <link rel="stylesheet" href="todolist.css" />
    <link rel="icon" href="to-do-list.png" />
  </head>
  <body>
    <main class="main">
      <section class="todo-card">
        <h1 class="todo-head">Task Mind</h1>
        <div class="input-container">
          <input
            type="text"
            name="input"
            id="input"
            class="todo-input"
            placeholder="Create a new task..."
            required
          />
          <button type="button" id="add-btn">Add Task</button>
        </div>
        <div class="task-container">
          <ul class="task-list"></ul>
        </div>
      </section>
    </main>
    <script src="todulist.js"></script>
  </body>
</html>
